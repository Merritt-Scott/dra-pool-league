const { useState, useEffect, useCallback, useMemo } = React;


const fmtDate = (iso) => { if (!iso) return ""; const d = new Date(iso); return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };
const P = { navy:"#001B36", mid:"#003052", blue:"#1598CB", orange:"#F18A00", amber:"#FFAD33", white:"#FFF", off:"#C8DAE8", grey:"#9BB0C4", dim:"#6A8AA0", glass:"rgba(255,255,255,.05)", gb:"rgba(255,255,255,.12)", ok:"#34D399", bad:"#F87171", wc:"#C4A1FF" };
const uid = () => Math.random().toString(36).slice(2, 9);
const nw = () => new Date().toISOString();
const dd = (a, b) => Math.abs(new Date(a) - new Date(b)) / 864e5;
function shuf(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; }

function buildBoxes(ids, lad, randomize = false) {
  let rk = lad.filter(s => ids.includes(s.id)); if (randomize) rk = shuf(rk); const bx = []; let i = 0;
  while (i < rk.length) { const rem = rk.length - i;
    if (rem <= 6) { bx.push({ name: "Swing Box", isSwing: true, players: rk.slice(i).map(s => s.id) }); break; }
    bx.push({ name: "Box " + (bx.length + 1), isSwing: false, players: rk.slice(i, i + 4).map(s => s.id) }); i += 4; }
  if (bx.length && !bx[bx.length - 1].isSwing) { bx[bx.length - 1].isSwing = true; bx[bx.length - 1].name = "Swing Box"; }
  return bx;
}
function genBM(boxes) { const m = []; boxes.forEach((b, bi) => { for (let i = 0; i < b.players.length; i++) for (let j = i + 1; j < b.players.length; j++) m.push({ id: uid(), type: "box", box: bi, boxName: b.name, player1: b.players[i], player2: b.players[j], score1: null, score2: null, completed: false, completedAt: null }); }); return m; }

function boxSt(pids, matches) {
  const s = {}; pids.forEach(id => { s[id] = { id, pts: 0, w: 0, l: 0, rw: 0, rl: 0 }; });
  matches.filter(m => m.completed).forEach(m => { if (!s[m.player1] || !s[m.player2]) return;
    if (m.forfeit || (m.score1 === 0 && m.score2 === 0)) return;
    s[m.player1].rw += m.score1; s[m.player1].rl += m.score2; s[m.player2].rw += m.score2; s[m.player2].rl += m.score1;
    if (m.score1 > m.score2) { s[m.player1].pts += m.score2 === 0 ? 5 : 4; s[m.player1].w++; s[m.player2].pts += m.score2 > 0 ? 2 : 0; s[m.player2].l++; }
    else { s[m.player2].pts += m.score1 === 0 ? 5 : 4; s[m.player2].w++; s[m.player1].pts += m.score1 > 0 ? 2 : 0; s[m.player1].l++; } });
  return Object.values(s).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    let aW = 0, bW = 0;
    matches.filter(m => m.completed && !m.forfeit && ((m.player1 === a.id && m.player2 === b.id) || (m.player1 === b.id && m.player2 === a.id))).forEach(m => { if ((m.player1 === a.id && m.score1 > m.score2) || (m.player2 === a.id && m.score2 > m.score1)) aW++; else bW++; });
    if (aW !== bW) return bW - aW;
    return b.w - a.w || b.rw - a.rw || (b.rw - b.rl) - (a.rw - a.rl);
  });
}

function calcLad(players, st) {
  const s = {}; players.forEach(p => { s[p.id] = { id: p.id, name: p.name, points: 0, boxPts: 0, wins: 0, losses: 0, rw: 0, rl: 0, mp: 0, last: p.joinedAt, inactive: false, streak: 0, noPlay: false }; });
  const all = [...(st.boxMatches || [])];
  (st.pastCycles || []).forEach(c => { (c.boxMatches || []).forEach(m => all.push(m)); (c.bonuses || []).forEach(b => { if (s[b.id]) s[b.id].points += b.pts; }); });
  // Sort by completedAt for streak calc
  const sorted = all.filter(m => m.completed).sort((a, b) => (a.completedAt || "").localeCompare(b.completedAt || ""));
  sorted.forEach(m => {
    const a = s[m.player1], b = s[m.player2]; if (!a || !b) return;
    if (m.forfeit || (m.score1 === 0 && m.score2 === 0)) return;
    a.mp++; b.mp++; a.rw += m.score1; a.rl += m.score2; b.rw += m.score2; b.rl += m.score1;
    if (m.completedAt) { if (m.completedAt > a.last) a.last = m.completedAt; if (m.completedAt > b.last) b.last = m.completedAt; }
    const w1 = m.score1 > m.score2; const wp = w1 ? (m.score2 === 0 ? 5 : 4) : (m.score1 === 0 ? 5 : 4); const lp = w1 ? (m.score2 > 0 ? 2 : 0) : (m.score1 > 0 ? 2 : 0);
    if (w1) { a.points += wp; a.boxPts += wp; a.wins++; b.points += lp; b.boxPts += lp; b.losses++; a.streak = a.streak > 0 ? a.streak + 1 : 1; b.streak = 0; }
    else { b.points += wp; b.boxPts += wp; b.wins++; a.points += lp; a.boxPts += lp; a.losses++; b.streak = b.streak > 0 ? b.streak + 1 : 1; a.streak = 0; }
  });
  if (st.boxes && st.boxMatches) { st.boxes.forEach((box, bi) => { const bm = st.boxMatches.filter(m => m.box === bi); const realBM = bm.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)); if (realBM.length > 0 && bm.every(m => m.completed)) { const bs = boxSt(box.players, realBM); if (bs[0] && s[bs[0].id]) { s[bs[0].id].points += 3; s[bs[0].id].boxPts += 3; } if (bs[1] && s[bs[1].id]) { s[bs[1].id].points += 1; s[bs[1].id].boxPts += 1; } } }); }
  (st.pastCycles || []).forEach(c => { (c.bonuses || []).forEach(b => { if (s[b.id] && b.pts > 0) s[b.id].boxPts += b.pts; }); });
  // 42-day inactivity flag (long-term absent)
  const t = nw(); players.forEach(p => { if (s[p.id].last && dd(t, s[p.id].last) > 42) s[p.id].inactive = true; });
  // 14-day no-play penalty: if a round is active and a player checked in but has zero completed real matches
  // for that round when the round duration has elapsed, they are flagged as noPlay and moved to bottom.
  if (st.cycleStart && st.boxes && st.boxes.length > 0) {
    const roundElapsedDays = dd(nw(), st.cycleStart);
    const roundDurDays = (st.cycleDurationWeeks || 2) * 7;
    if (roundElapsedDays >= roundDurDays) {
      const activeIds = new Set(st.boxes.flatMap(b => b.players));
      activeIds.forEach(id => {
        if (!s[id]) return;
        const played = (st.boxMatches || []).some(m => (m.player1 === id || m.player2 === id) && m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0));
        if (!played) s[id].noPlay = true;
      });
    }
  }
  const h2hMap = buildH2HMap(st);
  return Object.values(s).sort((a, b) => {
    // noPlay players go to absolute bottom (below inactive)
    if (a.noPlay !== b.noPlay) return a.noPlay ? 1 : -1;
    if (a.inactive !== b.inactive) return a.inactive ? 1 : -1;
    if (b.points !== a.points) return b.points - a.points;
    const h2h = getH2H(a.id, b.id, st, h2hMap);
    if (h2h && h2h.w1 !== h2h.w2) return h2h.w2 - h2h.w1;
    return b.wins - a.wins || b.rw - a.rw;
  });
}

// Build H2H lookup table in a single pass — O(m) instead of O(n^2 * m) when used in sort
function buildH2HMap(st) {
  const map = {};
  const all = [...(st.boxMatches || [])];
  (st.pastCycles || []).forEach(c => { (c.boxMatches || []).forEach(m => all.push(m)); });
  all.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)).forEach(m => {
    const k1 = m.player1 + ":" + m.player2;
    const k2 = m.player2 + ":" + m.player1;
    if (!map[k1]) map[k1] = { w1: 0, w2: 0 };
    if (!map[k2]) map[k2] = { w1: 0, w2: 0 };
    if (m.score1 > m.score2) { map[k1].w1++; map[k2].w2++; }
    else { map[k1].w2++; map[k2].w1++; }
  });
  return map;
}
// Head-to-head record between two players (uses pre-built map if provided)
function getH2H(p1, p2, st, h2hMap) {
  if (h2hMap) { const r = h2hMap[p1 + ":" + p2]; return r && (r.w1 || r.w2) ? r : null; }
  const all = [...(st.boxMatches || [])];
  (st.pastCycles || []).forEach(c => { (c.boxMatches || []).forEach(m => all.push(m)); });
  let w1 = 0, w2 = 0;
  all.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)).forEach(m => {
    if (m.player1 === p1 && m.player2 === p2) { if (m.score1 > m.score2) w1++; else w2++; }
    else if (m.player1 === p2 && m.player2 === p1) { if (m.score1 > m.score2) w2++; else w1++; }
  });
  if (w1 === 0 && w2 === 0) return null;
  return { w1, w2 };
}

// ELO rating system — score-margin weighted, provisional K, per-match deltas
function calcElo(players, st) {
  const K_BOX = 32, K_PROV = 48, PROV = 8, BASE = 1000;
  const ratings = {}, played = {}, deltas = {};
  players.forEach(p => { ratings[p.id] = BASE; played[p.id] = 0; });
  const all = [];
  (st.pastCycles || []).forEach(c => {
    (c.boxMatches || []).forEach(m => all.push({ ...m, _k: K_BOX }));
  });
  (st.boxMatches || []).forEach(m => all.push({ ...m, _k: K_BOX }));
  all.filter(m => m.completed && !m.forfeit && (m.score1 + m.score2) > 0 && ratings[m.player1] !== undefined && ratings[m.player2] !== undefined)
    .sort((a, b) => (a.completedAt || "").localeCompare(b.completedAt || ""))
    .forEach(m => {
      const ra = ratings[m.player1], rb = ratings[m.player2];
      const tot = m.score1 + m.score2;
      const res1 = m.score1 / tot, res2 = m.score2 / tot;
      const ea = 1 / (1 + Math.pow(10, (rb - ra) / 400));
      const ka = played[m.player1] < PROV ? K_PROV : m._k;
      const kb = played[m.player2] < PROV ? K_PROV : m._k;
      const da = Math.round(ka * (res1 - ea));
      const db = Math.round(kb * (res2 - (1 - ea)));
      ratings[m.player1] += da; ratings[m.player2] += db;
      played[m.player1]++; played[m.player2]++;
      deltas[m.id] = { [m.player1]: da, [m.player2]: db };
    });
  return { ratings, deltas, played };
}

// ─── BRACKET LOGIC ──────────────────────────────────────────────────
// Next power of 2 >= n
function nextPow2(n) {
  if (n < 2) return 2;
  let p = 1;
  while (p < n) p *= 2;
  return p;
}
// Standard bracket seeding positions: returns array of seeds (1-indexed)
// in the order they appear in round 1. For size 8: [1,8,4,5,2,7,3,6].
function seedingOrder(bracketSize) {
  let order = [1, 2];
  let size = 2;
  while (size < bracketSize) {
    const next = [];
    const newSize = size * 2;
    for (const seed of order) {
      next.push(seed);
      next.push(newSize + 1 - seed);
    }
    order = next;
    size = newSize;
  }
  return order;
}
// Generate a fresh bracket from a seed-ordered list of player ids.
// qualifiedPlayers[0] = seed 1, [1] = seed 2, etc.
function generateBracket(qualifiedPlayers) {
  const n = qualifiedPlayers.length;
  if (n < 2) return null;
  const bracketSize = nextPow2(n);
  const order = seedingOrder(bracketSize);
  const seedToPid = {};
  for (let i = 0; i < bracketSize; i++) {
    seedToPid[i + 1] = i < n ? qualifiedPlayers[i] : "BYE";
  }
  const rounds = [];
  const round1 = [];
  for (let i = 0; i < bracketSize; i += 2) {
    const seed1 = order[i];
    const seed2 = order[i + 1];
    const player1 = seedToPid[seed1];
    const player2 = seedToPid[seed2];
    const isBye = player1 === "BYE" || player2 === "BYE";
    const auto = isBye
      ? (player1 === "BYE" ? { winner: player2, s1: 0, s2: 2 } : { winner: player1, s1: 2, s2: 0 })
      : null;
    round1.push({
      id: uid(), round: 0, position: i / 2,
      player1, player2, seed1, seed2,
      score1: auto ? auto.s1 : null,
      score2: auto ? auto.s2 : null,
      completed: !!auto,
      completedAt: auto ? nw() : null,
      winner: auto ? auto.winner : null,
      isBye: !!isBye,
    });
  }
  rounds.push(round1);
  let roundSize = bracketSize / 2;
  let roundIdx = 1;
  while (roundSize >= 2) {
    const matches = [];
    const numMatches = roundSize / 2;
    for (let i = 0; i < numMatches; i++) {
      matches.push({
        id: uid(), round: roundIdx, position: i,
        player1: null, player2: null, seed1: null, seed2: null,
        score1: null, score2: null,
        completed: false, completedAt: null, winner: null, isBye: false,
      });
    }
    rounds.push(matches);
    roundSize = roundSize / 2;
    roundIdx++;
  }
  // Cascade BYE wins into round 2
  for (const m of rounds[0]) {
    if (m.completed && rounds[1]) {
      const nextMatch = rounds[1][Math.floor(m.position / 2)];
      const slot = m.position % 2 === 0 ? "player1" : "player2";
      const seedSlot = m.position % 2 === 0 ? "seed1" : "seed2";
      nextMatch[slot] = m.winner;
      nextMatch[seedSlot] = m.winner === seedToPid[m.seed1] ? m.seed1 : m.seed2;
    }
  }
  return { generatedAt: nw(), qualifiedPlayers: [...qualifiedPlayers], bracketSize, rounds, champion: null };
}
// Compute qualifiers from cumulative standings (all participants who played any real match).
function computeQualifiers(players, st) {
  const lad = calcLad(players, st);
  const participated = new Set();
  (st.pastCycles || []).forEach(c => {
    (c.boxMatches || []).forEach(m => {
      if (m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)) {
        participated.add(m.player1); participated.add(m.player2);
      }
    });
  });
  return lad.filter(s => participated.has(s.id)).map(s => s.id);
}
// Record a bracket match result and advance the winner.
function recordBracketResult(bracket, matchId, score1, score2) {
  let foundRound = -1, foundIdx = -1, m = null;
  for (let r = 0; r < bracket.rounds.length; r++) {
    const idx = bracket.rounds[r].findIndex(x => x.id === matchId);
    if (idx >= 0) { foundRound = r; foundIdx = idx; m = bracket.rounds[r][idx]; break; }
  }
  if (!m) return bracket;
  if (m.isBye) return bracket;
  if (score1 === score2) return bracket;
  if (score1 !== 2 && score2 !== 2) return bracket;
  const winner = score1 > score2 ? m.player1 : m.player2;
  const winnerSeed = score1 > score2 ? m.seed1 : m.seed2;
  const next = { ...bracket, rounds: bracket.rounds.map(r => r.map(mm => ({ ...mm }))) };
  const updated = next.rounds[foundRound][foundIdx];
  updated.score1 = score1; updated.score2 = score2;
  updated.completed = true; updated.completedAt = nw(); updated.winner = winner;
  if (foundRound + 1 < next.rounds.length) {
    const nextMatch = next.rounds[foundRound + 1][Math.floor(foundIdx / 2)];
    const slot = foundIdx % 2 === 0 ? "player1" : "player2";
    const seedSlot = foundIdx % 2 === 0 ? "seed1" : "seed2";
    nextMatch[slot] = winner;
    nextMatch[seedSlot] = winnerSeed;
  } else {
    next.champion = winner;
  }
  return next;
}

// Get monthly champions from past cycles (Box 1 winner)
function getChampions(st, gn) {
  const champs = [];
  (st.pastCycles || []).forEach(c => {
    if (c.boxes && c.boxes.length > 0 && !c.boxes[0].isSwing) {
      const box1 = c.boxes[0];
      const bm = (c.boxMatches || []).filter(m => m.box === 0);
      if (bm.length > 0 && bm.every(m => m.completed)) {
        const bs = boxSt(box1.players, bm);
        if (bs[0]) champs.push({ cycle: c.cycle, id: bs[0].id, name: gn(bs[0].id), date: c.startedAt });
      }
    }
  });
  // Check current cycle Box 1
  if (st.boxes && st.boxes.length > 0 && !st.boxes[0].isSwing) {
    const bm = (st.boxMatches || []).filter(m => m.box === 0);
    if (bm.length > 0 && bm.every(m => m.completed)) {
      const bs = boxSt(st.boxes[0].players, bm);
      if (bs[0]) champs.push({ cycle: st.cycleNumber, id: bs[0].id, name: gn(bs[0].id), date: st.cycleStart, current: true });
    }
  }
  return champs;
}

function useCD(cycleStart, weeks) { const [r, setR] = useState({ d: 0, h: 0, m: 0 }); useEffect(() => { const tick = () => { if (!cycleStart) { setR({ d: 0, h: 0, m: 0 }); return; } const end = new Date(new Date(cycleStart).getTime() + (weeks || 2) * 7 * 864e5); const diff = Math.max(0, end.getTime() - Date.now()); setR({ d: Math.floor(diff / 864e5), h: Math.floor((diff % 864e5) / 36e5), m: Math.floor((diff % 36e5) / 6e4) }); }; tick(); const id = setInterval(tick, 6e4); return () => clearInterval(id); }, [cycleStart, weeks]); return r; }

const bpS = { display: "block", width: "100%", marginTop: 10, padding: "13px 11px", background: "linear-gradient(135deg,#FF9500,#FFAD33,#F18A00)", color: P.navy, border: "none", borderRadius: 14, fontWeight: 700, fontSize: 13, cursor: "pointer", boxShadow: "0 4px 20px rgba(241,138,0,.4), inset 0 1px 0 rgba(255,255,255,.3)", transition: "transform .15s, box-shadow .15s" };
const bcS = { display: "block", width: "100%", marginTop: 4, padding: 7, background: "transparent", color: P.grey, border: "none", fontSize: 11, cursor: "pointer" };
const ssS = { width: "100%", padding: "11px 12px", background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.12)", borderRadius: 12, color: P.off, fontSize: 14, marginBottom: 6, transition: "border-color .2s, box-shadow .2s" };
const inpS = { flex: 1, padding: "11px 14px", background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.12)", borderRadius: 12, color: P.off, fontSize: 14, outline: "none", transition: "border-color .2s, box-shadow .2s" };

const DRALogo = () => <img src="logo_white.png" alt="DRA Advisors" style={{ display: "block", margin: "0 auto", width: 160, height: "auto" }} />;
const Tt = ({ children }) => <h3 style={{ fontSize: 18, fontWeight: 300, color: P.white, marginBottom: 14, fontFamily: "Georgia,serif", letterSpacing: 2 }}>{children}</h3>;
const Sub = ({ children }) => <h4 style={{ fontSize: 9, fontWeight: 700, color: P.orange, letterSpacing: 3, textTransform: "uppercase", margin: "18px 0 8px" }}>{children}</h4>;

const RankBadge = ({ change }) => {
  if (change === "new") return <span style={{ fontSize: 8, color: P.blue, fontWeight: 700 }}>NEW</span>;
  if (change > 0) return <span style={{ fontSize: 10, color: P.ok, fontWeight: 700 }}>{"\u25b2"}{change}</span>;
  if (change < 0) return <span style={{ fontSize: 10, color: P.bad, fontWeight: 700 }}>{"\u25bc"}{Math.abs(change)}</span>;
  return <span style={{ fontSize: 10, color: P.dim }}>{"\u2014"}</span>;
};
const StreakBadge = ({ streak }) => {
  if (streak < 3) return null;
  return <span style={{ fontSize: 10, marginLeft: 4 }}>{"\ud83d\udd25"}{streak}</span>;
};
const SPECTATOR = new URLSearchParams(window.location.search).get("mode") === "spectator";

function App() {
  const [st, setSt] = useState(null);
  const [view, setView] = useState("home");
  const [toast, setToast] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [navIdx, setNavIdx] = useState(0);
  const [tappedTab, setTappedTab] = useState(null);
  const [dbError, setDbError] = useState(null);
  const [showQR, setShowQR] = useState(false);
  const [checkInFocus, setCheckInFocus] = useState(false);
  const touchStartY = React.useRef(0);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };
  useEffect(() => {
    const unsub = DOC_REF.onSnapshot(
      (doc) => { setDbError(null); if (doc.exists) setSt(doc.data()); else DOC_REF.set(DEF).then(() => setSt(DEF)).catch(e => { console.error(e); setDbError(e.message); setSt(DEF); }); },
      (error) => { console.error("Firestore:", error); setDbError(error.message); setSt(prev => prev || DEF); }
    );
    return () => unsub();
  }, []);
  const saveTimer = React.useRef(null);
  const save = useCallback((s) => { const prev = st; setSt(s); if (saveTimer.current) clearTimeout(saveTimer.current); saveTimer.current = setTimeout(async () => { try { await DOC_REF.set(s); } catch (e) { console.error("Save failed:", e); setSt(prev); flash("Save failed — check connection"); } }, 300); }, [st]);
  const forceRefresh = useCallback(() => { setRefreshing(true); DOC_REF.get().then(doc => { if (doc.exists) setSt(doc.data()); }).catch(() => {}).finally(() => setRefreshing(false)); }, []);
  const onTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
  const onTouchEnd = (e) => { if (e.changedTouches[0].clientY - touchStartY.current > 70 && window.scrollY === 0) forceRefresh(); };
  const cd = useCD(st?.cycleStart, st?.cycleDurationWeeks);
  const ladder = useMemo(() => st ? calcLad(st.players, st) : [], [st]);
  const activeIds = st ? new Set([...(st.boxes || []).flatMap(b => b.players), ...(st.boxMatches || []).filter(m => m.completed).flatMap(m => [m.player1, m.player2])]) : new Set();
  const activeLad = ladder.filter(s => activeIds.has(s.id));
  const gn = (id) => { if (!st) return "?"; const p = st.players.find(x => x.id === id); return p ? p.name : "?"; };
  const ini = (id) => gn(id).split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 3);
  if (!st) return <div style={{ background: P.navy, minHeight: "100vh", padding: "60px 14px" }}>
    <style>{"@keyframes spin{to{transform:rotate(360deg)}} @keyframes shimmerLoad{0%{background-position:200% center}100%{background-position:-200% center}}"}</style>
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      <div style={{ ...gc, height: 80, background: "linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.03) 75%)", backgroundSize: "200% 100%", animation: "shimmerLoad 1.5s infinite" }} />
      {[1,2,3,4,5].map(i => <div key={i} style={{ ...gc, height: 44, marginBottom: 6, background: "linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.03) 75%)", backgroundSize: "200% 100%", animation: "shimmerLoad 1.5s infinite", animationDelay: i * 0.1 + "s" }} />)}
      <div style={{ textAlign: "center", marginTop: 20 }}><div style={{ width: 24, height: 24, border: "2px solid " + P.mid, borderTop: "2px solid " + P.orange, borderRadius: "50%", animation: "spin .7s linear infinite", display: "inline-block" }} /></div>
    </div>
  </div>;

  const addP = (n) => { if (!n.trim() || st.players.find(p => p.name.toLowerCase() === n.trim().toLowerCase())) { flash("Invalid/duplicate"); return; } const np = { id: uid(), name: n.trim(), joinedAt: nw() }; save(withLog({ ...st, players: [...st.players, np] }, "PLAYER_ADDED", n.trim())); flash(n.trim() + " joined!"); };
  const rmP = (id) => { const nm = (st.players.find(p => p.id === id) || {}).name || id; const ns = { ...st, players: st.players.filter(p => p.id !== id), checkedIn: st.checkedIn.filter(c => c !== id), boxMatches: (st.boxMatches || []).map(m => (m.player1 === id || m.player2 === id) && !m.completed ? { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true } : m) }; save(withLog(ns, "PLAYER_REMOVED", nm)); flash("Removed"); };
  const togCI = (id) => { if (!st.players.some(p => p.id === id)) return; const checked = st.checkedIn.includes(id); save(withLog({ ...st, checkedIn: checked ? st.checkedIn.filter(c => c !== id) : [...st.checkedIn, id] }, "CHECKIN_TOGGLED", gn(id))); };
  const selLast = () => { if (!st.pastCycles.length) { flash("No previous round"); return; } const lastC = st.pastCycles[st.pastCycles.length - 1]; const allM = (lastC.boxMatches || []).filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)); const ids = [...new Set(allM.flatMap(m => [m.player1, m.player2]))].filter(id => st.players.some(p => p.id === id)); if (!ids.length) { flash("No previous round"); return; } save(withLog({ ...st, checkedIn: ids }, "CHECKIN_AUTO_SELECT", ids.length + " players")); flash(ids.length + " from last round!"); };
  const completeCyc = () => {
    const bon = [];
    if (st.boxes) st.boxes.forEach((box, bi) => { const bm = (st.boxMatches || []).filter(m => m.box === bi); const realBM = bm.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)); if (realBM.length > 0 && bm.every(m => m.completed)) { const bs = boxSt(box.players, realBM); if (bs[0]) bon.push({ id: bs[0].id, pts: 3 }); if (bs[1]) bon.push({ id: bs[1].id, pts: 1 }); } });
    const past = st.cycleNumber > 0 ? [...st.pastCycles, { cycle: st.cycleNumber, boxMatches: st.boxMatches || [], boxes: st.boxes || [], bonuses: [...bon], startedAt: st.cycleStart, randomized: true }] : st.pastCycles;
    save(withLog({ ...st, pastCycles: past, boxes: [], boxMatches: [] }, "CYCLE_COMPLETED", "Round " + st.cycleNumber));
    flash("Round " + st.cycleNumber + " complete!");
  };
  const endEarlyCyc = () => {
    const bon = [];
    const afBM = (st.boxMatches || []).map(m => !m.completed ? { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true, autoForfeit: true } : m);
    if (st.boxes) st.boxes.forEach((box, bi) => { const bm = afBM.filter(m => m.box === bi); const realBM = bm.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)); if (realBM.length > 0) { const bs = boxSt(box.players, realBM); if (bs[0]) bon.push({ id: bs[0].id, pts: 3 }); if (bs[1]) bon.push({ id: bs[1].id, pts: 1 }); } });
    const past = [...st.pastCycles, { cycle: st.cycleNumber, boxMatches: afBM, boxes: st.boxes || [], bonuses: [...bon], startedAt: st.cycleStart, randomized: true }];
    save(withLog({ ...st, pastCycles: past, boxes: [], boxMatches: [] }, "CYCLE_ENDED_EARLY", "Round " + st.cycleNumber));
    flash("Round " + st.cycleNumber + " ended.");
  };
  // Build the archive object for the current round (dry-run, no save)
  const buildArchive = () => {
    if (st.cycleNumber > 0 && (st.boxes || []).length > 0) {
      const bon = [];
      const afBM = (st.boxMatches || []).map(m => !m.completed ? { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true, autoForfeit: true } : m);
      if (st.boxes) st.boxes.forEach((box, bi) => { const bm = afBM.filter(m => m.box === bi); const realBM = bm.filter(m => m.completed && !m.forfeit && !(m.score1 === 0 && m.score2 === 0)); if (realBM.length > 0) { const bs = boxSt(box.players, realBM); if (bs[0]) bon.push({ id: bs[0].id, pts: 3 }); if (bs[1]) bon.push({ id: bs[1].id, pts: 1 }); } });
      return [...st.pastCycles, { cycle: st.cycleNumber, boxMatches: afBM, boxes: st.boxes || [], bonuses: [...bon], startedAt: st.cycleStart, randomized: true }];
    }
    return st.pastCycles;
  };
  // Compute random boxes for admin preview — does NOT write to Firestore
  const previewCyc = () => {
    if (st.checkedIn.length < 4) { flash("Need 4+"); return null; }
    if (st.cycleNumber > 0 && (st.boxes || []).length > 0) { flash("Round already in progress"); return null; }
    const past = buildArchive();
    const nl = calcLad(st.players, { ...st, pastCycles: past, boxMatches: [], boxes: [] });
    // Random box assignment — true round-robin format, fresh groups every round
    const playerReasons = {};
    st.checkedIn.forEach(pid => {
      const everPlayed = past.some(c => (c.boxMatches || []).some(m => m.player1 === pid || m.player2 === pid));
      playerReasons[pid] = { reason: everPlayed ? "returning" : "new", fromBox: null, lastRecord: null };
    });
    return { randomize: true, suggestedBoxes: buildBoxes(st.checkedIn, nl, true), playerReasons, eloRatings: {}, eloPlayed: {}, eloFrac: {} };
  };
  // Confirm: save admin-approved (possibly adjusted) boxes to Firestore
  const confirmCyc = (finalBoxes, randomize, movedIds) => {
    const past = buildArchive();
    const stampedBoxes = finalBoxes.map(box => ({ ...box, manuallyPlaced: box.players.filter(id => movedIds.has(id)) }));
    const bm = genBM(stampedBoxes);
    const ns = { ...st, pastCycles: past, boxes: stampedBoxes, boxMatches: bm, checkedIn: [], cycleStart: nw(), cycleNumber: st.cycleNumber + 1, cycleRandomized: true };
    save(withLog(ns, "CYCLE_STARTED", "Round " + (st.cycleNumber + 1)));
    flash("Round " + (st.cycleNumber + 1) + " started!");
  };
  const undoCyc = () => { if (st.cycleNumber < 1) return; const prev = st.pastCycles[st.pastCycles.length - 1]; const restore = arr => (arr || []).map(m => m.autoForfeit ? { ...m, score1: null, score2: null, completed: false, completedAt: null, forfeit: false, autoForfeit: false } : m); const base = prev ? { ...st, pastCycles: st.pastCycles.slice(0, -1), boxes: prev.boxes || [], boxMatches: restore(prev.boxMatches), checkedIn: [], cycleStart: prev.startedAt, cycleNumber: st.cycleNumber - 1 } : { ...st, boxes: [], boxMatches: [], checkedIn: [], cycleStart: null, cycleNumber: 0 }; save(withLog(base, "CYCLE_UNDONE", "Round " + st.cycleNumber)); flash("Undone!"); };
  const logR = (id, s1, s2, list) => { if (typeof s1 !== "number" || typeof s2 !== "number" || s1 < 0 || s2 < 0 || s1 > 2 || s2 > 2 || (s1 !== 2 && s2 !== 2) || s1 === s2) { flash("Invalid score"); return; } const m = st[list].find(x => x.id === id); const det = m ? gn(m.player1) + " " + s1 + "-" + s2 + " " + gn(m.player2) : id; const playerIds = new Set(st.players.map(p => p.id)); const newCI = m ? [...new Set([...st.checkedIn, m.player1, m.player2])].filter(id => playerIds.has(id)) : st.checkedIn; save(withLog({ ...st, [list]: st[list].map(m => m.id === id ? { ...m, score1: s1, score2: s2, completed: true, completedAt: nw(), forfeit: false } : m), checkedIn: newCI }, "MATCH_RECORDED", det)); flash(m ? gn(m.player1) + " " + s1 + "–" + s2 + " " + gn(m.player2) : "Recorded!"); };
  const ffM = (id, list) => { const m = st[list].find(x => x.id === id); const det = m ? gn(m.player1) + " vs " + gn(m.player2) : id; save(withLog({ ...st, [list]: st[list].map(m => m.id === id ? { ...m, score1: 0, score2: 0, completed: true, completedAt: nw(), forfeit: true } : m) }, "MATCH_FORFEIT", det)); flash(m ? gn(m.player1) + " vs " + gn(m.player2) + " — not played" : "Not played"); };
  const genBracket = () => {
    const quals = computeQualifiers(st.players, st);
    if (quals.length < 2) { flash("Need 2+ participants"); return; }
    const b = generateBracket(quals);
    save(withLog({ ...st, bracket: b }, "BRACKET_GENERATED", quals.length + " qualifiers"));
    flash("Bracket generated! " + quals.length + " qualifiers");
  };
  const resetBracket = () => {
    save(withLog({ ...st, bracket: null }, "BRACKET_RESET", ""));
    flash("Bracket reset");
  };
  const recordBracket = (matchId, s1, s2) => {
    if (!st.bracket) { flash("No bracket"); return; }
    if (s1 === s2) { flash("Tie not allowed"); return; }
    if (s1 !== 2 && s2 !== 2) { flash("Best of 3: one player must reach 2"); return; }
    const nb = recordBracketResult(st.bracket, matchId, s1, s2);
    const det = nb.champion ? "CHAMPION: " + (st.players.find(p => p.id === nb.champion) || {}).name : "match recorded";
    save(withLog({ ...st, bracket: nb }, nb.champion ? "BRACKET_CHAMPION" : "BRACKET_MATCH", det));
    if (nb.champion) flash("🏆 Champion crowned!");
    else flash("Match recorded — winner advances");
  };
  const resetAll = () => { save(DEF); flash("Reset!"); setView("home"); };

  const seedingRoundsNeeded = st.seedingRounds || 5;
  const completedRounds = (st.pastCycles || []).length;
  const bracketUnlocked = completedRounds >= seedingRoundsNeeded;
  const tabs = SPECTATOR
    ? [["home", "\ud83c\udfc6"], ["boxes", "\ud83d\udcca"], ["matches", "\ud83c\udfb1"], ["bracket", "\ud83c\udfaf"], ["rules", "\ud83d\udcd6"]]
    : [["home", "\ud83c\udfc6"], ["boxes", "\ud83d\udcca"], ["matches", "\ud83c\udfb1"], ["bracket", "\ud83c\udfaf"], ["checkin", "\u2705"], ["rules", "\ud83d\udcd6"]];

  return (
    <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{ minHeight: "100vh", background: P.navy, color: P.off, fontFamily: "'DM Sans',Helvetica,sans-serif" }}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes slideT{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
        @keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
        @keyframes orbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
        @keyframes navBounce{0%{transform:scale(1) translateY(0)}30%{transform:scale(1.35) translateY(-5px)}60%{transform:scale(.95) translateY(1px)}100%{transform:scale(1) translateY(0)}}
        @keyframes glowBurst{0%{opacity:.7;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        button:active{transform:scale(.97)}
        input:focus,select:focus{outline:none!important;border-color:rgba(21,152,203,.7)!important;box-shadow:0 0 0 3px rgba(21,152,203,.2)!important}
        select option{background:${P.navy};color:${P.off}}
      `}</style>
      {toast && <div style={{ position: "fixed", top: 12, left: "50%", transform: "translateX(-50%)", zIndex: 100, background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", color: P.navy, padding: "9px 22px", borderRadius: 12, fontSize: 12, fontWeight: 700, animation: "slideT .25s ease-out", whiteSpace: "nowrap" }}>{toast}</div>}
      {dbError && <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 98, background: "rgba(248,113,113,.15)", borderBottom: "1px solid rgba(248,113,113,.3)", padding: "6px 16px", fontSize: 11, color: P.bad, textAlign: "center" }}>⚠️ Firebase: {dbError} — <span onClick={() => window.location.reload()} style={{ textDecoration: "underline", cursor: "pointer" }}>retry</span></div>}
      {refreshing && <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", zIndex: 99, background: "rgba(255,255,255,.08)", backdropFilter: "blur(20px)", borderRadius: "0 0 12px 12px", padding: "6px 18px", fontSize: 11, color: P.blue, fontWeight: 700, border: "1px solid rgba(255,255,255,.15)", borderTop: "none" }}>Refreshing…</div>}
      <div style={{ position: "fixed", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
        <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(21,152,203,.18) 0%, transparent 65%)", top: "-150px", right: "-150px", animation: "orbFloat1 12s ease-in-out infinite" }} />
        <div style={{ position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(241,138,0,.12) 0%, transparent 65%)", bottom: "80px", left: "-100px", animation: "orbFloat2 15s ease-in-out infinite" }} />
        <div style={{ position: "absolute", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,200,180,.08) 0%, transparent 65%)", bottom: "-80px", right: "20%", animation: "orbFloat3 10s ease-in-out infinite" }} />
      </div>
      <div style={{ position: "sticky", top: 0, zIndex: 8, background: "rgba(255,255,255,.06)", backdropFilter: "blur(20px) saturate(150%)", WebkitBackdropFilter: "blur(20px) saturate(150%)", borderBottom: "1px solid rgba(255,255,255,.12)", boxShadow: "0 2px 20px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15)", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 18px", animation: "slideDown .2s ease-out" }}>
        {(st.boxes || []).length > 0 ? <span style={{ fontSize: 11, fontWeight: 700, color: P.orange }}>Round {st.cycleNumber}</span> : <span style={{ fontSize: 11, color: P.dim }}>DRA Pool</span>}
        {(st.boxes || []).length > 0 ? <span style={{ fontSize: 11, color: P.off }}>{cd.d}d {cd.h}h {cd.m}m left</span> : <span />}
        <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
          <button onClick={forceRefresh} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: "2px 4px", opacity: .45, lineHeight: 1, transition: "transform .3s", transform: refreshing ? "rotate(360deg)" : "none" }}>↻</button>
          <button onClick={() => setShowQR(true)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, padding: "2px 4px", opacity: .45, lineHeight: 1 }}>📷</button>
          {!SPECTATOR && <button onClick={() => { setView("admin"); setNavIdx(-1); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, padding: "2px 4px", opacity: .45, lineHeight: 1 }}>🔒</button>}
        </div>
      </div>
      {showQR && (
        <div onClick={() => setShowQR(false)} style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,10,20,.96)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20, animation: "fadeIn .2s" }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: P.orange, letterSpacing: 3, textTransform: "uppercase" }}>Join the League</p>
          <div style={{ background: "#fff", borderRadius: 16, padding: 16 }}>
            <img src={"https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(window.location.href)} width={260} height={260} alt="QR Code" style={{ display: "block", borderRadius: 4 }} />
          </div>
          <p style={{ fontSize: 11, color: P.dim }}>Tap anywhere to close</p>
        </div>
      )}
      <main style={{ maxWidth: 600, margin: "0 auto", padding: "0 14px 110px", animation: "fadeIn .3s", position: "relative", zIndex: 1 }}>
        {view === "home" && <Home st={st} ladder={ladder} gn={gn} ini={ini} cd={cd} onJoin={() => { setView("checkin"); setNavIdx(4); setCheckInFocus(true); }} />}
        {view === "boxes" && <BoxesV st={st} gn={gn} ini={ini} logR={logR} ffM={ffM} />}
        {view === "matches" && <MatchesV st={st} gn={gn} logR={logR} ffM={ffM} />}
        {view === "bracket" && <BracketV st={st} gn={gn} recordBracket={recordBracket} bracketUnlocked={bracketUnlocked} completedRounds={completedRounds} seedingRoundsNeeded={seedingRoundsNeeded} />}
        {view === "checkin" && <CheckInV st={st} ladder={ladder} togCI={togCI} selLast={selLast} autoOpen={checkInFocus} onAutoOpenDone={() => setCheckInFocus(false)} />}

      </div>}
      {ffConf === m.id && <div style={{ marginTop: 10, padding: "10px 12px", background: "rgba(248,113,113,.08)", border: "1px solid rgba(248,113,113,.3)", borderRadius: 10 }}>

// ─── CHECK IN ───────────────────────────────────────────────
function CheckInV({ st, ladder, togCI, selLast, autoOpen, onAutoOpenDone }) {
  const [search, setSearch] = useState("");
  const [showSignUp, setShowSignUp] = useState(true);
  const [showRemaining, setShowRemaining] = useState(false);
  const [confirmJoinId, setConfirmJoinId] = useState(null);
  const signupRef = React.useRef(null);
  React.useEffect(() => {
    if (!autoOpen) return;
    setShowSignUp(true);
    setShowRemaining(true);
    setTimeout(() => { signupRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }); }, 150);
    if (onAutoOpenDone) onAutoOpenDone();
  }, [autoOpen]);
  // Playing This Round — players in the current active round
  const currentIds = new Set((st.boxes || []).flatMap(b => b.players));
  const currentPlayers = ladder.filter(s => currentIds.has(s.id));

  // Sign Up for Next Round
  const playing = ladder.filter(s => st.checkedIn.includes(s.id));
  const notPlaying = ladder.filter(s => !st.checkedIn.includes(s.id));
  const boxWcIds = new Set((st.boxMatches || []).filter(m => m.completed && !m.forfeit).flatMap(m => [m.player1, m.player2]));
  const allCurrentIds = new Set((st.boxMatches || []).filter(m => m.completed && !m.forfeit).flatMap(m => [m.player1, m.player2]));
  const returning = playing.filter(s => boxWcIds.has(s.id));
  const newPlayers = playing.filter(s => !boxWcIds.has(s.id) && !allCurrentIds.has(s.id));
  const other = playing.filter(s => allCurrentIds.has(s.id) && !boxWcIds.has(s.id));
  const filtered = search.trim() ? notPlaying.filter(s => s.name.toLowerCase().includes(search.toLowerCase())) : notPlaying;

  const secBtn = (label, show, onToggle, count) => (

  return (<div style={{ paddingTop: 16 }}>

          <p style={{ fontSize: 16, fontWeight: 700, color: P.white, marginBottom: 8 }}>Join the League?</p>
          <p style={{ fontSize: 13, color: P.grey, marginBottom: 20 }}>{(st.players.find(p => p.id === confirmJoinId) || {}).name || "This player"} will be signed up for the next round.</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { togCI(confirmJoinId); setConfirmJoinId(null); }} style={{ flex: 1, padding: "12px 0", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", border: "none", borderRadius: 12, color: P.navy, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Yes, I'm in!</button>
            <button onClick={() => setConfirmJoinId(null)} style={{ flex: 1, padding: "12px 0", background: "transparent", border: "1px solid " + P.dim, borderRadius: 12, color: P.grey, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>No</button>
          </div>
        </div>
      </div>
    )}
    <Tt>Players</Tt>
    <p style={{ fontSize: 12, color: P.grey, marginBottom: 10 }}>{st.checkedIn.length} of {st.players.length} Signed up for next round</p>

    {/* Playing This Round — read-only */}
    {st.cycleNumber > 0 && currentPlayers.length > 0 && (<>
      {secBtn("Playing This Round", true, () => {}, currentPlayers.length)}
      <div style={gc}>
        {currentPlayers.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
            <span style={{ fontSize: 9, color: P.dim }}>active</span>
          </div>

    {/* Sign Up for Next Round */}

    {st.pastCycles.length > 0 && playing.length === 0 && (
      <button onClick={selLast} style={{ ...bpS, marginBottom: 8 }}>Check in all from last round</button>
    )}
    {playing.length > 0 && <p style={{ fontSize: 11, color: P.ok, textAlign: "center", marginBottom: 6, fontWeight: 600 }}>{playing.length} checked in</p>}
    {showSignUp && (
      <div style={gc}>
        {playing.length === 0 && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>No one signed up yet. Use the button above or check in players individually.</p>}
        {returning.map(s => playerRow(s, togCI, "Leave", leaveBtn, "RETURNING"))}
        {newPlayers.map(s => playerRow(s, togCI, "Leave", leaveBtn, "NEW"))}
        {other.map(s => playerRow(s, togCI, "Leave", leaveBtn, null))}

        {/* Remaining — collapsed */}
        <div ref={signupRef} onClick={() => setShowRemaining(v => !v)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0 6px", cursor: "pointer", userSelect: "none", marginTop: 4, borderTop: "1px solid rgba(21,152,203,.08)" }}>
          <span style={{ fontSize: 9, color: P.dim }}>{showRemaining ? "\u25bc" : "\u25b6"}</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: P.dim, letterSpacing: 1 }}>NOT SIGNED UP ({notPlaying.length})</span>
        </div>
        {showRemaining && (<>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inpS, width: "100%", marginBottom: 8, flex: "none", fontSize: 12 }} />
          {filtered.map(s => playerRow(s, id => setConfirmJoinId(id), "Join", joinBtn, false))}
          {filtered.length === 0 && search && <p style={{ color: P.dim, fontSize: 12, padding: "8px 0", textAlign: "center" }}>No matches for "{search}"</p>}
          {filtered.length === 0 && !search && <p style={{ fontSize: 12, color: P.dim, textAlign: "center", padding: "8px 0" }}>Everyone is already signed up!</p>}
        </>)}
      </div>
    )}
  </div>);
}

    ["5. Playing Out of the Kitchen & Scratches", "When the cue ball is behind the break line, your first hit must contact a ball or rail outside the kitchen. Any scratch (cue ball into a pocket) — whether playing out of the kitchen or during normal play — results in ball-in-hand behind the kitchen line only. Your opponent must place the cue ball behind the break line before shooting."],

// ─── BRACKET ─────────────────────────────────────────────────
function BracketV({ st, gn, recordBracket, bracketUnlocked, completedRounds, seedingRoundsNeeded }) {
  const [activeId, setActiveId] = useState(null);
  const [s1, setS1] = useState(2);
  const [s2, setS2] = useState(0);
  const ini3 = (id) => { if (!id) return ""; if (id === "BYE") return "BYE"; const n = gn(id); return n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 3); };
  const valid = (s1 === 2 && s2 < 2) || (s2 === 2 && s1 < 2);
  const sub = (matchId) => { if (valid) { recordBracket(matchId, s1, s2); setActiveId(null); setS1(2); setS2(0); } };
  const cancel = () => { setActiveId(null); setS1(2); setS2(0); };

  if (!bracketUnlocked) {
    const remaining = seedingRoundsNeeded - completedRounds;
    return (
      <div style={{ paddingTop: 16 }}>
        <Tt>Tournament Bracket</Tt>
        <div style={{ ...gc, textAlign: "center", padding: "40px 20px" }}>
          <p style={{ fontSize: 56, marginBottom: 12 }}>\ud83d\udd12</p>
          <p style={{ fontSize: 16, fontWeight: 700, color: P.white, marginBottom: 8, fontFamily: "Georgia,serif" }}>Locked</p>
          <p style={{ fontSize: 13, color: P.grey, marginBottom: 14 }}>Bracket unlocks after the {seedingRoundsNeeded}-round seeding phase ends.</p>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 10, background: "rgba(0,20,40,.5)", border: "1px solid " + P.gb, borderRadius: 12, padding: "10px 18px" }}>
            <span style={{ fontSize: 11, color: P.dim, letterSpacing: 2, fontWeight: 700 }}>PROGRESS</span>
            <span style={{ fontSize: 20, fontWeight: 700, color: P.orange, fontFamily: "Georgia,serif" }}>{completedRounds}<span style={{ color: P.dim, fontSize: 14 }}> / {seedingRoundsNeeded}</span></span>
          </div>
          <p style={{ fontSize: 11, color: P.dim, marginTop: 14 }}>{remaining} round{remaining !== 1 ? "s" : ""} remaining</p>
        </div>
      </div>
    );
  }

  if (!st.bracket) {
    return (
      <div style={{ paddingTop: 16 }}>
        <Tt>Tournament Bracket</Tt>
        <div style={{ ...gc, textAlign: "center", padding: "40px 20px" }}>
          <p style={{ fontSize: 56, marginBottom: 12 }}>\ud83c\udfaf</p>
          <p style={{ fontSize: 16, fontWeight: 700, color: P.white, marginBottom: 8, fontFamily: "Georgia,serif" }}>Bracket not generated yet</p>
          <p style={{ fontSize: 12, color: P.grey }}>The admin will generate the bracket once seeding rounds are finalized.</p>
        </div>
      </div>
    );
  }

  const b = st.bracket;
  const roundLabel = (idx, total) => {
    const fromEnd = total - 1 - idx;
    if (fromEnd === 0) return "Final";
    if (fromEnd === 1) return "Semifinals";
    if (fromEnd === 2) return "Quarterfinals";
    return "Round of " + Math.pow(2, total - idx);
  };

  return (
    <div style={{ paddingTop: 16 }}>
      <Tt>Tournament Bracket</Tt>
      {b.champion ? (
        <div style={{ ...gc, padding: "20px 16px", marginBottom: 14, background: "linear-gradient(135deg, rgba(255,184,0,.18), rgba(241,138,0,.08))", borderColor: "rgba(255,184,0,.4)", textAlign: "center" }}>
          <p style={{ fontSize: 11, color: P.amber, letterSpacing: 4, fontWeight: 700, marginBottom: 8 }}>SEASON CHAMPION</p>
          <p style={{ fontSize: 28, fontWeight: 700, color: P.white, fontFamily: "Georgia,serif" }}>\ud83c\udfc6 {gn(b.champion)}</p>
        </div>
      ) : (
        <p style={{ fontSize: 11, color: P.dim, textAlign: "center", marginBottom: 14 }}>{b.qualifiedPlayers.length} qualifiers \u00b7 bracket of {b.bracketSize}</p>
      )}
      <div style={{ overflowX: "auto", paddingBottom: 10 }}>
        <div style={{ display: "flex", gap: 16, minWidth: b.rounds.length * 200 }}>
          {b.rounds.map((round, rIdx) => (
            <div key={rIdx} style={{ flex: "0 0 200px", display: "flex", flexDirection: "column" }}>
              <p style={{ fontSize: 9, color: P.amber, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", marginBottom: 10, textAlign: "center" }}>{roundLabel(rIdx, b.rounds.length)}</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, justifyContent: "space-around", flex: 1 }}>
                {round.map(m => {
                  const isActive = activeId === m.id;
                  const playable = !m.completed && !m.isBye && m.player1 && m.player2;
                  const isWin1 = m.completed && m.winner === m.player1;
                  const isWin2 = m.completed && m.winner === m.player2;
                  return (
                    <div key={m.id} style={{ background: m.isBye ? "rgba(255,255,255,.02)" : "rgba(0,20,40,.55)", border: "1px solid " + (isActive ? P.amber : "rgba(255,255,255,.08)"), borderRadius: 10, overflow: "hidden", opacity: m.isBye ? 0.55 : 1 }}>
                      {/* Player 1 row */}
                      <div onClick={() => playable && setActiveId(activeId === m.id ? null : m.id)} style={{ display: "flex", alignItems: "center", padding: "8px 10px", borderBottom: "1px solid rgba(255,255,255,.05)", cursor: playable ? "pointer" : "default", background: isWin1 ? "rgba(255,184,0,.08)" : "transparent" }}>
                        <span style={{ fontSize: 9, color: P.dim, width: 22 }}>{m.seed1 ? "#" + m.seed1 : ""}</span>
                        <span style={{ flex: 1, fontSize: 12, fontWeight: isWin1 ? 700 : 500, color: m.player1 === "BYE" ? P.dim : (isWin1 ? P.white : P.off), fontStyle: m.player1 === "BYE" ? "italic" : "normal" }}>{m.player1 ? (m.player1 === "BYE" ? "BYE" : gn(m.player1)) : <span style={{ color: P.dim }}>TBD</span>}</span>
                        {m.completed && <span style={{ fontSize: 13, fontWeight: 700, color: isWin1 ? P.amber : P.dim, width: 18, textAlign: "center" }}>{m.score1}</span>}
                      </div>
                      {/* Player 2 row */}
                      <div onClick={() => playable && setActiveId(activeId === m.id ? null : m.id)} style={{ display: "flex", alignItems: "center", padding: "8px 10px", cursor: playable ? "pointer" : "default", background: isWin2 ? "rgba(255,184,0,.08)" : "transparent" }}>
                        <span style={{ fontSize: 9, color: P.dim, width: 22 }}>{m.seed2 ? "#" + m.seed2 : ""}</span>
                        <span style={{ flex: 1, fontSize: 12, fontWeight: isWin2 ? 700 : 500, color: m.player2 === "BYE" ? P.dim : (isWin2 ? P.white : P.off), fontStyle: m.player2 === "BYE" ? "italic" : "normal" }}>{m.player2 ? (m.player2 === "BYE" ? "BYE" : gn(m.player2)) : <span style={{ color: P.dim }}>TBD</span>}</span>
                        {m.completed && <span style={{ fontSize: 13, fontWeight: 700, color: isWin2 ? P.amber : P.dim, width: 18, textAlign: "center" }}>{m.score2}</span>}
                      </div>
                      {/* Score entry expanded */}
                      {isActive && (
                        <div style={{ padding: "10px 10px 12px", background: "rgba(0,10,25,.7)", borderTop: "1px solid " + P.amber }}>
                          <p style={{ fontSize: 9, color: P.amber, letterSpacing: 2, fontWeight: 700, textAlign: "center", marginBottom: 8 }}>BEST OF 3</p>
                          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                            {[m.player1, m.player2].map((pid, pi) => {
                              const cur = pi === 0 ? s1 : s2, set = pi === 0 ? setS1 : setS2;
                              const ov = pi === 0 ? s2 : s1, so = pi === 0 ? setS2 : setS1;
                              return (
                                <div key={pi} style={{ flex: 1, textAlign: "center" }}>
                                  <p style={{ fontSize: 9, color: P.off, marginBottom: 5, fontWeight: 600 }}>{ini3(pid)}</p>
                                  <div style={{ display: "flex", gap: 3, justifyContent: "center" }}>
                                    {[0, 1, 2].map(v => <button key={v} onClick={() => { set(v); if (v === 2 && ov === 2) so(1); }} style={{ width: 28, height: 28, borderRadius: 7, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, background: cur === v ? "linear-gradient(135deg," + P.amber + ",#F59E0B)" : "rgba(255,255,255,.08)", color: cur === v ? P.navy : P.off }}>{v}</button>)}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                          <div style={{ display: "flex", gap: 5 }}>
                            <button onClick={() => sub(m.id)} disabled={!valid} style={{ flex: 1, padding: "7px 0", background: valid ? "linear-gradient(135deg,#34D399,#059669)" : "rgba(255,255,255,.08)", border: "none", borderRadius: 7, color: valid ? "#fff" : P.dim, fontWeight: 700, fontSize: 11, cursor: valid ? "pointer" : "default" }}>{valid ? "Confirm " + s1 + "\u2013" + s2 : "Pick scores"}</button>

                        </div>
                      )}
                    </div>
                  );

          ))}
        </div>
      </div>

  );
}

                    {isNew && <span style={{ fontSize: 9, color: P.orange, fontWeight: 700, background: "rgba(241,138,0,.15)", border: "1px solid rgba(241,138,0,.3)", borderRadius: 4, padding: "1px 5px" }}>NEW</span>}
                    {lrank && <span style={{ fontSize: 10, color: P.orange, fontWeight: 700 }}>#{lrank.rank}</span>}
                    {lrank && <span style={{ fontSize: 10, color: P.dim }}>{lrank.points}pts</span>}
                    {(previewElo.played[pid] || 0) >= 3 && <span style={{ fontSize: 9, color: (previewElo.frac[pid] || 0) < 0.33 ? P.ok : (previewElo.frac[pid] || 0) > 0.66 ? P.bad : P.dim, fontWeight: 600 }}>ELO {Math.round(previewElo.ratings[pid] || 1000)}</span>}
                    {isMoved && <span style={{ fontSize: 9, color: P.blue, fontWeight: 700, background: "rgba(21,152,203,.15)", border: "1px solid rgba(21,152,203,.3)", borderRadius: 4, padding: "1px 5px" }}>MOVED</span>}
                    <span style={{ fontSize: 13, color: isSrc ? P.blue : P.dim }}>⇄</span>

      <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 4 }}>
        <button onClick={() => { confirmCyc(previewBoxes, previewRandomize, manuallyMoved); setShowBoxPreview(false); setSwapSrc(null); setManuallyMoved(new Set()); }} style={{ ...bpS, marginTop: 0, background: "linear-gradient(135deg," + P.amber + ",#F59E0B)", color: P.navy }}>Start Round {st.cycleNumber + 1}</button>
        <button onClick={() => { setPreviewBoxes(suggestedBoxes.map(b => ({ ...b, players: [...b.players] }))); setManuallyMoved(new Set()); setSwapSrc(null); }} style={{ ...bcS, color: P.blue }}>Reset to Suggested</button>
        <button onClick={() => { setShowBoxPreview(false); setSwapSrc(null); setManuallyMoved(new Set()); }} style={bcS}>Cancel</button>
      </div>
    </div>
  );

  return (<div style={{ paddingTop: 16 }}><Tt>Admin <span style={{ fontSize: 11, color: P.ok }}>{"\ud83d\udd13"}</span></Tt>
    <div style={gc}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showPlayers ? 8 : 0 }}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif" }}>Players ({st.players.length})</h4>
        <button onClick={() => setShowPlayers(v => !v)} style={{ background: "none", border: "none", color: P.dim, fontSize: 14, cursor: "pointer" }}>{showPlayers ? "\u25bc" : "\u25b6"}</button>
      </div>
      {showPlayers && <div>
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}><input value={nm} onChange={e => setNm(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && nm.trim()) { addP(nm); setNm(""); } }} placeholder="New player..." style={inpS} /><button onClick={() => { if (nm.trim()) { addP(nm); setNm(""); } }} style={{ padding: "10px 18px", background: "linear-gradient(135deg," + P.orange + "," + P.amber + ")", color: P.navy, border: "none", borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>Add</button></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inpS, width: "100%", marginBottom: 8, flex: "none", fontSize: 12 }} />
        <div style={{ maxHeight: 250, overflowY: "auto" }}>{filtLad.map((s, i) => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ fontSize: 11, color: P.orange, fontWeight: 700, width: 24 }}>#{ladder.indexOf(s) + 1}</span>
            <span style={{ flex: 1, fontSize: 13 }}>{s.name}</span>
            <span style={{ fontSize: 10, color: P.dim }}>{s.points}pts</span>
            {rmId === s.id ? (<div style={{ display: "flex", gap: 3 }}><button onClick={() => { rmP(s.id); setRmId(null); }} style={{ padding: "3px 8px", background: P.bad, color: "#fff", border: "none", borderRadius: 6, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Remove</button><button onClick={() => setRmId(null)} style={{ padding: "3px 8px", background: P.mid, color: P.grey, border: "none", borderRadius: 6, fontSize: 10, cursor: "pointer" }}>Keep</button></div>) : <button onClick={() => setRmId(s.id)} style={{ background: "transparent", border: "none", color: P.dim, fontSize: 16, cursor: "pointer" }}>{"\u00d7"}</button>}
          </div>))}</div>
      </div>}
    </div>

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Round Duration</h4>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <input type="number" min="1" max="12" value={st.cycleDurationWeeks || 2} onChange={e => save({ ...st, cycleDurationWeeks: Math.max(1, Math.min(12, +e.target.value || 1)) })} style={{ ...ssS, width: 70, marginBottom: 0, textAlign: "center" }} />
        <span style={{ fontSize: 12, color: P.grey }}>weeks per round</span>
      </div>
    </div>

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Season Configuration</h4>
      <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Define your league's summer season window. Display only — does not auto-start or auto-stop rounds.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ fontSize: 11, color: P.grey, width: 80, flexShrink: 0 }}>Season name</label>
          <input type="text" value={st.seasonName || ""} placeholder="e.g. Summer 2026" onChange={e => save({ ...st, seasonName: e.target.value })} style={{ ...inpS, flex: 1 }} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ fontSize: 11, color: P.grey, width: 80, flexShrink: 0 }}>Start date</label>
          <input type="date" value={st.seasonStart ? st.seasonStart.slice(0, 10) : ""} onChange={e => save({ ...st, seasonStart: e.target.value ? new Date(e.target.value).toISOString() : null })} style={{ ...inpS, flex: 1 }} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ fontSize: 11, color: P.grey, width: 80, flexShrink: 0 }}>End date</label>
          <input type="date" value={st.seasonEnd ? st.seasonEnd.slice(0, 10) : ""} onChange={e => save({ ...st, seasonEnd: e.target.value ? new Date(e.target.value).toISOString() : null })} style={{ ...inpS, flex: 1 }} />
        </div>
      </div>
      {st.seasonStart && st.seasonEnd && (
        <p style={{ fontSize: 10, color: P.dim, marginTop: 8 }}>Season runs {fmtDate(st.seasonStart)} → {fmtDate(st.seasonEnd)} ({Math.round(dd(st.seasonEnd, st.seasonStart))} days)</p>
      )}
    </div>

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Tournament Bracket</h4>
      <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Bracket unlocks for players once {seedingRoundsNeeded} round{seedingRoundsNeeded !== 1 ? "s" : ""} are complete. Currently {completedRounds}/{seedingRoundsNeeded}.</p>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <label style={{ fontSize: 11, color: P.grey, flex: 1 }}>Seeding rounds before bracket unlocks</label>
        <input type="number" min="1" max="20" value={st.seedingRounds || 5} onChange={e => save({ ...st, seedingRounds: Math.max(1, Math.min(20, +e.target.value || 1)) })} style={{ ...ssS, width: 60, marginBottom: 0, textAlign: "center" }} />
      </div>
      {st.bracket ? (
        <div>
          <div style={{ background: "rgba(255,184,0,.06)", border: "1px solid rgba(255,184,0,.2)", borderRadius: 10, padding: "10px 12px", marginBottom: 8 }}>
            <p style={{ fontSize: 11, color: P.amber, fontWeight: 700, marginBottom: 4 }}>Bracket generated</p>
            <p style={{ fontSize: 10, color: P.grey }}>{st.bracket.qualifiedPlayers.length} qualifiers · bracket of {st.bracket.bracketSize} · {st.bracket.champion ? "Champion: " + gn(st.bracket.champion) : "In progress"}</p>
