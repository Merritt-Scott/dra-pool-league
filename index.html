          )}
        </div>
      ) : completedRounds < seedingRoundsNeeded ? (
        <p style={{ fontSize: 11, color: P.dim, fontStyle: "italic" }}>Complete {seedingRoundsNeeded - completedRounds} more round{seedingRoundsNeeded - completedRounds !== 1 ? "s" : ""} to enable bracket generation.</p>
      ) : (
        <button onClick={genBracket} style={{ ...bpS, background: "linear-gradient(135deg," + P.amber + ",#F59E0B)", color: P.navy, marginTop: 0 }}>Generate Bracket</button>
      )}
    </div>

    {(() => {
      const roundActive = st.cycleNumber > 0 && (st.boxes||[]).length > 0;
      const allDone = roundActive && (st.boxMatches||[]).every(m => m.completed);
      const cycleComplete = st.cycleNumber > 0 && (st.boxes||[]).length === 0;
      const noRound = !st.cycleNumber || cycleComplete;
      return (
        <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Rounds</h4>
          <p style={{ fontSize: 12, color: P.grey, marginBottom: 10 }}>
            {!st.cycleNumber ? "No active round." : cycleComplete ? "Round " + st.cycleNumber + " complete. Ready for next." : allDone ? "Round " + st.cycleNumber + " — all matches done!" : "Round " + st.cycleNumber + " · " + pend + " pending · " + st.checkedIn.length + " signed up for next"}
          </p>
          {st.checkedIn.length > 0 && (() => {
            const N = st.checkedIn.length;
            let suggestion;
            if (N < 4) suggestion = "Need 4+ players to start";
            else if (N % 4 === 0) suggestion = (N / 4) + " box" + (N / 4 !== 1 ? "es" : "") + " of 4 — perfect fit";
            else if (N % 4 === 1) suggestion = (Math.floor(N / 4) - 1) + " boxes of 4 + swing of 5 (or remove 1)";
            else if (N % 4 === 2) suggestion = Math.floor(N / 4) + " box" + (Math.floor(N / 4) !== 1 ? "es" : "") + " of 4 + swing of 6";
            else suggestion = Math.floor(N / 4) + " box" + (Math.floor(N / 4) !== 1 ? "es" : "") + " of 4 + swing of 3";
            const ciElo = calcElo(st.players, st);
            const bwIds = new Set((st.boxMatches || []).filter(m => m.completed && !m.forfeit).flatMap(m => [m.player1, m.player2]));
            const acIds = bwIds;
            return (
              <div style={{ marginBottom: 10 }}>
                <div onClick={() => setShowCheckedIn(v => !v)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", marginBottom: 4 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: P.dim }}>{showCheckedIn ? "▼" : "▶"}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: P.grey }}>SIGNED UP ({N})</span>
                  <span style={{ fontSize: 10, color: N < 4 ? P.bad : P.dim, marginLeft: "auto" }}>{suggestion}</span>
                </div>
                {showCheckedIn && (
                  <div style={{ background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "6px 10px" }}>
                    {st.checkedIn.map(id => {
                      const elo = (ciElo.played[id] || 0) >= 3 ? Math.round(ciElo.ratings[id] || 1000) : null;
                      const isRet = bwIds.has(id);
                      const isNew = !acIds.has(id);
                      return (
                        <div key={id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
                          {isRet && <span style={{ fontSize: 8, color: P.ok, fontWeight: 700, background: "rgba(52,211,153,.12)", border: "1px solid rgba(52,211,153,.35)", borderRadius: 4, padding: "1px 5px" }}>RETURNING</span>}
                          {!isRet && isNew && <span style={{ fontSize: 8, color: P.orange, fontWeight: 700, background: "rgba(241,138,0,.15)", border: "1px solid rgba(241,138,0,.3)", borderRadius: 4, padding: "1px 5px" }}>NEW</span>}
                          <span style={{ flex: 1, fontSize: 12, color: P.off }}>{gn(id)}</span>
                          {elo && <span style={{ fontSize: 10, color: P.dim, fontWeight: 600 }}>{elo}</span>}
                          <button onClick={() => togCI(id)} style={{ background: "transparent", border: "1px solid " + P.bad, borderRadius: 6, color: P.bad, fontSize: 10, fontWeight: 700, padding: "2px 8px", cursor: "pointer" }}>Remove</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}
          {(() => {
            if (roundActive && !allDone) return cc ? (
              <div>
                <div style={{ background: "rgba(248,113,113,.08)", border: "1px solid rgba(248,113,113,.25)", borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>
                  <p style={{ fontSize: 11, color: P.bad, fontWeight: 700, marginBottom: 6 }}>⚠ {pend} match{pend !== 1 ? "es" : ""} will be marked not played:</p>
                  {pendingMatches.map(m => <p key={m.id} style={{ fontSize: 11, color: P.grey, margin: "2px 0" }}>• {gn(m.player1)} vs {gn(m.player2)} <span style={{ color: P.dim }}>({m.label})</span></p>)}
                </div>
                <button onClick={() => { endEarlyCyc(); setCc(false); }} style={{ ...bpS, background: "linear-gradient(135deg,#F87171,#EF4444)", marginTop: 0 }}>Confirm — End Round {st.cycleNumber}</button>
                <button onClick={() => setCc(false)} style={bcS}>Cancel</button>
              </div>
            ) : <div><button onClick={() => setCc(true)} style={{ ...bpS, background: "linear-gradient(135deg," + P.orange + ",#F87171)" }}>End Round {st.cycleNumber} Early</button><p style={{ fontSize: 9, color: P.dim, textAlign: "center", marginTop: 4 }}>Forfeit {pend} remaining match{pend !== 1 ? "es" : ""} and archive results</p></div>;

            if (roundActive && allDone) return cc ? (
              <div>
                <p style={{ fontSize: 11, color: P.ok, marginBottom: 8 }}>✓ All matches done — archive Round {st.cycleNumber}?</p>
                <button onClick={() => { completeCyc(); setCc(false); }} style={{ ...bpS, background: "linear-gradient(135deg,#34D399,#059669)", marginTop: 0 }}>Confirm — Complete Round {st.cycleNumber}</button>
                <button onClick={() => setCc(false)} style={bcS}>Cancel</button>
              </div>
            ) : (
              <div style={{ background: "rgba(52,211,153,.08)", border: "1px solid rgba(52,211,153,.25)", borderRadius: 12, padding: "10px 14px" }}>
                <p style={{ fontSize: 12, color: P.ok, fontWeight: 700, marginBottom: 8 }}>✓ All matches complete</p>
                <button onClick={() => setCc(true)} style={{ ...bpS, background: "linear-gradient(135deg,#34D399,#059669)", marginTop: 0 }}>Complete Round {st.cycleNumber}</button>
                <p style={{ fontSize: 9, color: P.dim, textAlign: "center", marginTop: 4 }}>Archive results and prepare for next round</p>
              </div>
            );

            if (noRound) {
              if (st.checkedIn.length < 4) return <p style={{ fontSize: 11, color: P.bad }}>Need 4+ signed up to start ({st.checkedIn.length} so far)</p>;
              const openPreview = () => {
                const data = previewCyc();
                if (!data) return;
                setPreviewBoxes(data.suggestedBoxes.map(b => ({ ...b, players: [...b.players] })));
                setSuggestedBoxes(data.suggestedBoxes.map(b => ({ ...b, players: [...b.players] })));
                setPreviewRandomize(data.randomize);
                setManuallyMoved(new Set());
                setSwapSrc(null);
                setPlayerReasons(data.playerReasons || {});
                setPreviewElo({ ratings: data.eloRatings || {}, played: data.eloPlayed || {}, frac: data.eloFrac || {} });
                setShowBoxPreview(true);
                setCc(false);
              };
              return (
                <div>
                  <button onClick={openPreview} style={{ ...bpS, background: "linear-gradient(135deg," + P.amber + ",#F59E0B)", color: P.navy }}>Preview Boxes for Round {st.cycleNumber + 1}</button>
                </div>
              );
            }
            return null;
          })()}
        </div>
      );
    })()}

    {st.cycleNumber > 0 && (st.boxes||[]).length > 0 && <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, marginBottom: 6, fontFamily: "Georgia,serif" }}>Undo</h4>
      {cu ? <div><p style={{ fontSize: 11, color: P.bad, marginBottom: 6 }}>Delete Round {st.cycleNumber}?</p><button onClick={() => { undoCyc(); setCu(false); }} style={{ ...bpS, background: P.amber, color: P.navy }}>Yes</button><button onClick={() => setCu(false)} style={bcS}>Cancel</button></div>
        : <div><button onClick={() => setCu(true)} style={{ ...bpS, background: "transparent", border: "1px solid " + P.amber, color: P.amber }}>Undo Round {st.cycleNumber}</button><p style={{ fontSize: 9, color: P.dim, textAlign: "center", marginTop: 4 }}>Restore round and un-forfeit auto-forfeited matches</p></div>}</div>}

    {(st.pastCycles || []).length > 0 && (() => {
      const lastC = st.pastCycles[st.pastCycles.length - 1];
      const rBM = (lastC.boxMatches || []).filter(m => m.completed && !m.forfeit);
      const pTot = {};
      const ep = id => { if (!pTot[id]) pTot[id] = { id, pts: 0 }; };
      rBM.forEach(m => { ep(m.player1); ep(m.player2); if (m.score1 > m.score2) { pTot[m.player1].pts += m.score2 === 0 ? 5 : 4; if (m.score2 > 0) pTot[m.player2].pts += 2; } else { pTot[m.player2].pts += m.score1 === 0 ? 5 : 4; if (m.score1 > 0) pTot[m.player1].pts += 2; } });
      (lastC.bonuses || []).forEach(b => { ep(b.id); pTot[b.id].pts += b.pts; });
      const sorted = Object.values(pTot).sort((a, b) => b.pts - a.pts);
      const topScorer = sorted[0];
      const shutouts = rBM.filter(m => (m.score1 === 2 && m.score2 === 0) || (m.score2 === 2 && m.score1 === 0)).length;
      const totalPlayed = rBM.length;
      return (
        <div style={{ ...gc, background: "linear-gradient(135deg, rgba(241,138,0,.1), rgba(21,152,203,.06))", borderColor: "rgba(241,138,0,.25)" }}>
          <h4 style={{ fontSize: 15, fontWeight: 600, color: P.orange, fontFamily: "Georgia,serif", marginBottom: 4 }}>Round {lastC.cycle} Summary</h4>
          <p style={{ fontSize: 10, color: P.dim, marginBottom: 10 }}>{fmtDate(lastC.startedAt)}</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            <div style={{ flex: "0 0 100%", background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(196,161,255,.25)" }}>
              <p style={{ fontSize: 9, color: P.wc, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>🎲 GROUP WINNERS</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 14px" }}>
                {(lastC.boxes || []).map((box, bi) => { const bm = (lastC.boxMatches || []).filter(m => m.box === bi); const winner = boxSt(box.players, bm)[0]; return winner ? (<div key={bi} style={{ display: "flex", alignItems: "baseline", gap: 5 }}><span style={{ fontSize: 9, color: P.dim, fontWeight: 700 }}>{box.name}:</span><span style={{ fontSize: 12, color: P.white, fontWeight: 600 }}>{gn(winner.id)}</span></div>) : null; })}
              </div>
            </div>
            {topScorer && <div style={{ flex: 1, minWidth: 100, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(21,152,203,.2)" }}>
              <p style={{ fontSize: 9, color: P.blue, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>⭐ TOP SCORER</p>
              <p style={{ fontSize: 13, color: P.white, fontWeight: 600 }}>{gn(topScorer.id)} <span style={{ color: P.orange, fontSize: 11 }}>{topScorer.pts}pts</span></p>
            </div>}
            <div style={{ flex: 1, minWidth: 80, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(255,255,255,.08)" }}>
              <p style={{ fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>🎱 MATCHES</p>
              <p style={{ fontSize: 13, color: P.off, fontWeight: 600 }}>{totalPlayed}</p>
            </div>
            <div style={{ flex: 1, minWidth: 80, background: "rgba(0,20,40,.4)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(255,255,255,.08)" }}>
              <p style={{ fontSize: 9, color: P.dim, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>⚡ SHUTOUTS</p>
              <p style={{ fontSize: 13, color: P.off, fontWeight: 600 }}>{shutouts}</p>
            </div>
          </div>
        </div>
      );
    })()}

    {(st.pastCycles || []).length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Past Rounds</h4>
        {[...(st.pastCycles || [])].reverse().map((c, revIdx) => {
          const cycleIdx = st.pastCycles.length - 1 - revIdx;
          const saveCycle = (idx, updated) => save(withLog({ ...st, pastCycles: st.pastCycles.map((x, i) => i === idx ? updated : x) }, "CYCLE_OVERRIDE", "Round " + updated.cycle));
          return <PastCycleRow key={c.cycle} c={c} gn={gn} cycleIdx={cycleIdx} saveCycle={saveCycle} />;
        })}
      </div>
    )}

    {(() => {
      const date = new Date().toISOString().slice(0, 10);
      const dl = (content, filename, type) => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([content], { type })); a.download = filename; a.click(); URL.revokeObjectURL(a.href); };
      const exportJSON = () => dl(JSON.stringify(st, null, 2), `dra-pool-backup-${date}.json`, "application/json");
      const exportCSV = () => { const elo = calcElo(st.players, st); const rows = [["Rank","Name","Points","Wins","Losses","Racks Won","Racks Lost","ELO"]]; ladder.forEach((s, i) => rows.push([i+1, s.name, s.points, s.wins, s.losses, s.rw, s.rl, elo.ratings[s.id] || 1000])); dl(rows.map(r => r.join(",")).join("\n"), `dra-pool-standings-${date}.csv`, "text/csv"); };
      return (
        <div style={gc}>
          <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 6 }}>Export Data</h4>
          <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Download a backup in case of issues.</p>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={exportJSON} style={{ ...bpS, flex: 1, marginTop: 0 }}>JSON Backup</button>
            <button onClick={exportCSV} style={{ ...bpS, flex: 1, marginTop: 0, background: "linear-gradient(135deg," + P.blue + ",#0e7aad)" }}>Standings CSV</button>
          </div>
        </div>
      );
    })()}

    {pendingMatches.length > 0 && (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.amber, fontFamily: "Georgia,serif", marginBottom: 6 }}>Pending Matches ({pendingMatches.length})</h4>
        {daysInCycle > 0 && <p style={{ fontSize: 11, color: P.grey, marginBottom: 10 }}>Round in progress for {Math.floor(daysInCycle)} day{Math.floor(daysInCycle) !== 1 ? "s" : ""}. {daysInCycle >= 7 ? "These are overdue." : ""}</p>}
        {pendingMatches.map(m => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid rgba(21,152,203,.06)" }}>
            <span style={{ fontSize: 9, fontWeight: 700, color: daysInCycle >= 7 ? P.bad : P.amber, width: 52, letterSpacing: 1 }}>{m.label.toUpperCase()}</span>
            <span style={{ flex: 1, fontSize: 12 }}>{gn(m.player1)} <span style={{ color: P.dim }}>vs</span> {gn(m.player2)}</span>
            <button onClick={() => ffM(m.id, "boxMatches")} style={{ padding: "4px 10px", background: "transparent", border: "1px solid " + P.dim, borderRadius: 7, color: P.dim, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Forfeit</button>
          </div>
        ))}
      </div>
    )}

    <div style={gc}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 8 }}>Admin PIN</h4>
      {!showPinChange ? (
        <button onClick={() => { setShowPinChange(true); setNewPinA(""); setNewPinB(""); setPinErr(""); }} style={{ ...bpS, background: "transparent", border: "1px solid " + P.dim, color: P.grey, marginTop: 0 }}>Change PIN</button>
      ) : (
        <div>
          <input type="password" inputMode="numeric" maxLength={4} value={newPinA} onChange={e => setNewPinA(e.target.value.replace(/\D/g, ""))} placeholder="New PIN (4 digits)" style={{ ...inpS, width: "100%", marginBottom: 8 }} />
          <input type="password" inputMode="numeric" maxLength={4} value={newPinB} onChange={e => setNewPinB(e.target.value.replace(/\D/g, ""))} placeholder="Confirm PIN" style={{ ...inpS, width: "100%", marginBottom: 8 }} />
          {pinErr && <p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>{pinErr}</p>}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { if (newPinA.length !== 4) { setPinErr("PIN must be 4 digits."); return; } if (newPinA !== newPinB) { setPinErr("PINs don't match."); return; } save(withLog({ ...st, adminPin: newPinA }, "PIN_CHANGED", "Admin PIN updated")); setShowPinChange(false); setPinErr(""); }} style={{ ...bpS, marginTop: 0 }}>Save PIN</button>
            <button onClick={() => setShowPinChange(false)} style={bcS}>Cancel</button>
          </div>
        </div>
      )}
    </div>

    <div style={{ ...gc, borderColor: "rgba(248,113,113,.2)" }}><h4 style={{ fontSize: 15, fontWeight: 600, color: P.bad, fontFamily: "Georgia,serif" }}>Danger Zone</h4>
      {cr ? <div><p style={{ fontSize: 11, color: P.bad, marginBottom: 8 }}>Delete ALL?</p><button onClick={() => { resetAll(); setCr(false); }} style={{ ...bpS, background: P.bad, color: "#fff" }}>Yes</button><button onClick={() => setCr(false)} style={bcS}>Cancel</button></div>
        : <button onClick={() => setCr(true)} style={{ ...bpS, background: "transparent", border: "1px solid " + P.bad, color: P.bad }}>Reset League</button>}</div>

    {/* League Announcement */}
    <div style={gc}>
      <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>League Announcement</h4>
      {st.announcement && st.announcement.text && <p style={{ fontSize: 11, color: P.off, marginBottom: 8, padding: "6px 10px", background: "rgba(255,173,51,.08)", borderRadius: 8 }}>📢 {st.announcement.text}</p>}
      <div style={{ display: "flex", gap: 6 }}>
        <input id="announceTxt" placeholder="Type announcement..." style={inpS} defaultValue={st.announcement?.text || ""} />
        <button onClick={() => { const txt = document.getElementById("announceTxt").value.trim(); save(withLog({ ...st, announcement: txt ? { text: txt, createdAt: nw() } : null }, "ANNOUNCEMENT", txt || "cleared")); }} style={{ ...bpS, width: "auto", marginTop: 0, padding: "8px 14px", whiteSpace: "nowrap" }}>{st.announcement?.text ? "Update" : "Post"}</button>
        {st.announcement?.text && <button onClick={() => save(withLog({ ...st, announcement: null }, "ANNOUNCEMENT", "cleared"))} style={{ ...bcS, width: "auto", marginTop: 0, padding: "8px 10px", color: P.bad }}>Clear</button>}
      </div>
    </div>

    {(st.auditLog || []).length > 0 && (() => {
      const allEntries = [...(st.auditLog || [])].reverse();
      const filtered = search.trim() ? allEntries.filter(e => (e.action + " " + (e.details || "")).toLowerCase().includes(search.toLowerCase())) : allEntries;
      return (
      <div style={gc}>
        <h4 style={{ fontSize: 15, fontWeight: 600, color: P.white, fontFamily: "Georgia,serif", marginBottom: 10 }}>Audit Log</h4>
        <input placeholder="Search log..." value={search} onChange={e => setSearch(e.target.value)} style={{ ...inpS, marginBottom: 8, fontSize: 12 }} />
        {search.trim() && <p style={{ fontSize: 9, color: P.dim, marginBottom: 4 }}>Showing {filtered.length} of {allEntries.length} entries</p>}
        <div style={{ maxHeight: 300, overflowY: "auto" }}>
          {filtered.slice(0, 50).map(e => (
            <div key={e.id} style={{ padding: "6px 0", borderBottom: "1px solid rgba(21,152,203,.06)", display: "flex", gap: 8, alignItems: "baseline" }}>
              <span style={{ fontSize: 9, color: P.dim, whiteSpace: "nowrap" }}>{new Date(e.ts).toLocaleDateString()} {new Date(e.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
              <span style={{ fontSize: 10, color: P.blue, fontWeight: 700, whiteSpace: "nowrap" }}>{e.action}</span>
              {e.details && <span style={{ fontSize: 10, color: P.grey }}>{e.details}</span>}
            </div>
          ))}
        </div>
      </div>);
    })()}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
